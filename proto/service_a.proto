syntax = "proto3";

package service_a;

option go_package = "github.com/example/test-devops/proto/service_a;serviceapb";

// PingRequest is an empty message for pinging.
message PingRequest {}

// PingResponse returns a simple message string.
message PingResponse {
  string message = 1;
}

// ServiceA defines the gRPC service exposed by service-a-go.
service ServiceA {
  rpc Ping(PingRequest) returns (PingResponse);
}
