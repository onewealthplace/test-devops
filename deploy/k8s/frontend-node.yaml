apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-node
  template:
    metadata:
      labels:
        app: frontend-node
    spec:
      containers:
      - name: frontend-node
        image: frontend-node
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: SERVICE_A_URL
          value: "http://service-a-go:8081"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-node
spec:
  selector:
    app: frontend-node
  ports:
    - port: 80
      targetPort: 8080
      name: http
